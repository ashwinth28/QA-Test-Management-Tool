<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Upload Test Cases - QA Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #343a40;
        }

        .container {
            padding-top: 80px;
            padding-bottom: 50px;
        }

        .card {
            max-width: 600px;
            margin: auto;
            background: #fff;
            border-radius: 15px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        h3 {
            text-align: center;
            font-weight: bold;
            margin-bottom: 30px;
        }

        input[type="file"] {
            border-radius: 8px;
        }

        button {
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        .upload-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 576px) {
            .card {
                padding: 30px 20px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h3>Upload Test Cases from Excel</h3>

            <!-- Success/Error Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="upload-info">
                <h6><i class="bi bi-info-circle"></i> Excel Format Requirements:</h6>
                <ul class="mb-0">
                    <li>First row should contain headers</li>
                    <li>Required columns: TestCaseId, Priority, TestType, TestCaseName</li>
                    <li>Optional columns: Precondition, TestSteps, ExpectedResult, ActualResult, Remarks</li>
                </ul>
            </div>

            <form th:action="@{/upload/excel}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Select Excel File</label>
                    <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
                    <small class="text-muted">Supported formats: .xlsx, .xls</small>
                </div>

                <div class="text-center">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-cloud-upload"></i> Upload and Import
                    </button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a href="/testcases/list" class="btn btn-outline-secondary">Cancel</a>
                <a href="/" class="btn btn-secondary ms-2">Back to Home</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
