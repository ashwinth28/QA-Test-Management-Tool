<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>QA Test Management Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Full page gradient background */
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #3b59d1, #17a673);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* Hero Section Container */
        .hero-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        /* Card style for hero content */
        .hero-card {
            background: rgba(255, 255, 255, 0.95);
            color: #343a40;
            border-radius: 15px;
            padding: 50px 40px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            max-width: 900px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s;
        }

        .hero-card:hover {
            transform: translateY(-5px);
        }

        .hero-card h1 {
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .hero-card p {
            font-size: 1.2rem;
            color: #6c757d;
            margin-bottom: 40px;
        }

        .quick-links .btn {
            min-width: 160px;
            padding: 15px 20px;
            font-size: 1.05rem;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        .quick-links .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        /* Optional illustration/image on top */
        .hero-image {
            max-width: 150px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        @media (max-width: 576px) {
            .hero-card h1 {
                font-size: 2rem;
            }

            .quick-links .btn {
                font-size: 0.95rem;
                min-width: 140px;
            }

            .hero-image {
                max-width: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="hero-container">
        <div class="hero-card">
            <!-- Optional illustration -->
            <img src="https://cdn-icons-png.flaticon.com/512/263/263088.png" alt="QA Icon" class="hero-image">

            <h1>QA Test Management Portal</h1>
            <p>Manage, execute, and track your test cases efficiently with a professional QA workflow.</p>

            <div class="d-flex justify-content-center gap-3 flex-wrap quick-links">
                <a href="/dashboard" class="btn btn-primary">Dashboard</a>
                <a href="/testcases/list" class="btn btn-success">View Test Cases</a>
                <a href="/upload" class="btn btn-warning text-dark">Upload Excel</a>
                <a href="/testcases/new" class="btn btn-info text-white">Create Test Case</a>
            </div>
        </div>
    </div>
</body>

</html>
